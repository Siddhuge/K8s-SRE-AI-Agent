# Second wave of failure scenarios: probe failure, DNS, TLS, unbound PVC.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: probefail, namespace: payments }
spec:
  replicas: 1
  selector: { matchLabels: { app: probefail } }
  template:
    metadata: { labels: { app: probefail } }
    spec:
      containers:
        - name: app
          image: nginx:1.25-alpine
          livenessProbe:                      # nginx serves on :80, probe hits :8080
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: dnsfail, namespace: payments }
spec:
  replicas: 1
  selector: { matchLabels: { app: dnsfail } }
  template:
    metadata: { labels: { app: dnsfail } }
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - 'echo "starting"; echo "FATAL: dial tcp: lookup payments-db.invalid on 10.96.0.10:53: no such host"; exit 1'
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: tlsfail, namespace: payments }
spec:
  replicas: 1
  selector: { matchLabels: { app: tlsfail } }
  template:
    metadata: { labels: { app: tlsfail } }
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - 'echo "connecting to upstream https://api.internal"; echo "tls: failed to verify certificate: x509: certificate has expired or is not yet valid"; exit 1'
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: data-pvc, namespace: payments }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: does-not-exist     # no such StorageClass → PVC never binds
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: pvcpending, namespace: payments }
spec:
  replicas: 1
  selector: { matchLabels: { app: pvcpending } }
  template:
    metadata: { labels: { app: pvcpending } }
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts: [{ name: data, mountPath: /data }]
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: data-pvc }
