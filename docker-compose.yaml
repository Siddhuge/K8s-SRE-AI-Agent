# Local dev: agent + pgvector for RAG. Point KUBECONFIG at a read-only context.
services:
  agent:
    build: .
    command: ["http", "--host", "0.0.0.0", "--port", "8080"]
    ports: ["8080:8080"]
    env_file: [.env]
    volumes:
      - ~/.kube:/home/nonroot/.kube:ro
      - ./config:/app/config:ro
    depends_on: [pgvector]

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sre_agent
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: sre_kb
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  pgdata:
