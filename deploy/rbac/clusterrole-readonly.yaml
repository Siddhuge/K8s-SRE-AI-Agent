# ─────────────────────────────────────────────────────────────────────────────
# THE SECURITY BOUNDARY.
#
# This ClusterRole grants the agent ONLY get/list/watch. There is no create,
# update, patch, delete, deletecollection, or the `pods/exec` subresource.
# Because the verbs simply aren't granted, the API server rejects any mutating or
# exec call regardless of what the agent (or a compromised model) attempts.
#
# Notably ABSENT (deny by omission):
#   • secrets:        get/list of secret *values* is NOT granted. The agent reads
#                     secret METADATA via the metadata.k8s.io API only (see below),
#                     so it can see "the secret changed" but never the contents.
#   • pods/exec:      not present → no shelling into containers.
#   • */scale:        not present → cannot scale.
#   • any write verb: not present anywhere.
#
# Pair this with NetworkPolicy egress limits and (optionally) a Gatekeeper/Kyverno
# policy that blocks any RoleBinding from ever adding write verbs to this SA.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-sre-agent-readonly
  labels:
    app.kubernetes.io/name: k8s-sre-agent
    rbac.example.com/tier: readonly
rules:
  # Core workload + topology objects — read only.
  - apiGroups: [""]
    resources:
      - pods
      - pods/log          # logs, including ?previous=true for crashed containers
      - events
      - nodes
      - services
      - endpoints
      - configmaps        # values readable; do not store secrets in configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - replicationcontrollers
      - serviceaccounts
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

  # Istio / service mesh (read-only) for mesh troubleshooting.
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.istio.io"]
    resources: ["peerauthentications", "authorizationpolicies"]
    verbs: ["get", "list", "watch"]

  # cert-manager (read-only) for TLS cert RCA.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests", "orders", "challenges"]
    verbs: ["get", "list", "watch"]

  # Metrics (read-only).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

  # Secret METADATA ONLY (names/types/keys/age) via the partial-metadata API.
  # This intentionally does NOT grant `secrets` in the core group, so values are
  # never readable.
  - apiGroups: ["metadata.k8s.io"]
    resources: ["secrets"]
    verbs: ["get", "list"]
