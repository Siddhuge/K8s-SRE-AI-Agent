apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-sre-agent
  namespace: sre-system
  labels:
    app.kubernetes.io/name: k8s-sre-agent
  annotations:
    # AKS Workload Identity (Entra) — federate, no static secret.
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000001"
    # EKS IRSA equivalent (use on EKS instead of the annotation above):
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/k8s-sre-agent-readonly
---
# Bind the read-only ClusterRole cluster-wide. For stricter tenant isolation, replace
# this with per-namespace RoleBindings to the same ClusterRole (see docs/security-rbac.md).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-sre-agent-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-sre-agent-readonly
subjects:
  - kind: ServiceAccount
    name: k8s-sre-agent
    namespace: sre-system
