name: release

# Tag a release (e.g. v0.1.0) → build, scan, and publish the image to GHCR,
# then create a GitHub Release. CI (ci.yaml) must be green on the commit.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write     # create the GitHub Release
  packages: write     # push to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - name: Scan image (Trivy) — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "true"
      - name: Push image (only after scan passes)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
